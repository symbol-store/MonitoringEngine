<!DOCTYPE html>
<meta charset="utf-8">
<style>
  #cols { display: flex; gap: 1rem; }
  #cols > div { flex: 1; min-width: 0; }
</style>
<button id="refresh">Refresh</button>
<button id="approve">Approve</button>
<button id="reject">Reject</button>
<button id="evaluate" disabled>Evaluate</button>
<label><input type="checkbox" id="pretty" checked> pretty-print</label>
<div id="cols">
  <div id="query"></div>
  <div id="result"></div>
</div>
<script src="boss.js"></script>
<script type="importmap">
{
  "imports": {
    "@codemirror/state": "https://esm.sh/*@codemirror/state@6.7.1",
    "@codemirror/view": "https://esm.sh/*@codemirror/view@6.43.6",
    "@codemirror/language": "https://esm.sh/*@codemirror/language@6.12.4",
    "@codemirror/legacy-modes/": "https://esm.sh/*@codemirror/legacy-modes@6.5.3/",
    "@lezer/common": "https://esm.sh/*@lezer/common@1.5.2",
    "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.3",
    "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.10",
    "@marijn/find-cluster-break": "https://esm.sh/@marijn/find-cluster-break@1.0.3",
    "style-mod": "https://esm.sh/style-mod@4.1.3",
    "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
    "crelt": "https://esm.sh/crelt@1.0.7"
  }
}
</script>
<script type="module">
import { EditorView } from "@codemirror/view";
import { EditorState } from "@codemirror/state";
import { StreamLanguage, foldGutter, foldService, syntaxHighlighting, defaultHighlightStyle } from "@codemirror/language";
import { commonLisp } from "@codemirror/legacy-modes/mode/commonlisp";

const lispFold = foldService.of((state, lineStart, lineEnd) => {
  const s = state.doc.toString();
  let open = -1;
  for (let i = lineStart; i < lineEnd; i++) {
    if (s[i] === "(") { open = i; break; }
    if (s[i] === ";" || s[i] === '"') break;
  }
  if (open === -1) return null;

  let depth = 0, inString = false;
  for (let i = open; i < s.length; i++) {
    const ch = s[i];
    if (inString) {
      if (ch === "\\") i++;
      else if (ch === '"') inString = false;
      continue;
    }
    if (ch === '"') inString = true;
    else if (ch === ";") { while (i < s.length && s[i] !== "\n") i++; }
    else if (ch === "(") depth++;
    else if (ch === ")") {
      if (--depth === 0) {
        return i > lineEnd ? { from: lineEnd, to: i + 1 } : null;
      }
    }
  }
  return null;
});

function makeEditor(parent) {
  return new EditorView({
    state: EditorState.create({
      doc: "",
      extensions: [
        foldGutter({ openText: "▾", closedText: "▸" }),
        StreamLanguage.define(commonLisp),
        syntaxHighlighting(defaultHighlightStyle),
        lispFold,
        EditorState.readOnly.of(true),
        EditorView.editable.of(false),
      ],
    }),
    parent,
  });
}

const queryView = makeEditor(document.getElementById("query"));
const resultView = makeEditor(document.getElementById("result"));

function setDoc(view, text) {
  view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: text } });
}

const WS_URL = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/ws";

// Replies arrive one-per-query in send order, so a FIFO queue correlates each
// socket frame with the loadCode() call that sent it.
let socket = null;
const pending = [];

function bttMenu(show) {
  if (typeof trigger_action !== "function") return;
  try {
    trigger_action({
      json: JSON.stringify({
        BTTPredefinedActionType: show ? 386 : 387,
        BTTAdditionalActionData: '{"BTTMenuActionMenuID":"BOSS"}',
      }),
      wait_for_reply: true,
    });
  } catch (e) {
    /* BTT bridge unavailable — ignore */
  }
}

// A new query arriving over the socket rings the menu; error frames aren't queries.
function notifyNewQuery(text) {
  if (text.startsWith(";; error:")) return;
  bttMenu(true);
}

function openSocket() {
  socket = new WebSocket(WS_URL);
  socket.addEventListener("message", (e) => {
    const waiter = pending.shift();
    if (waiter) waiter.resolve(e.data);
    notifyNewQuery(e.data);
  });
  const fail = (reason) => {
    while (pending.length) pending.shift().reject(reason);
    socket = null;
  };
  socket.addEventListener("close", () => fail(new Error("connection closed")));
  socket.addEventListener("error", () => fail(new Error("connection error")));
  return socket;
}

function socketReady() {
  if (!socket || socket.readyState === WebSocket.CLOSING || socket.readyState === WebSocket.CLOSED)
    openSocket();
  if (socket.readyState === WebSocket.OPEN) return Promise.resolve();
  return new Promise((resolve, reject) => {
    // Whichever of open/error fires first aborts the signal, detaching the other
    // listener so it can't linger on the socket for the rest of its life.
    const settled = new AbortController();
    const finish = (done, value) => { settled.abort(); done(value); };
    socket.addEventListener("open", () => finish(resolve), { signal: settled.signal });
    socket.addEventListener("error", () => finish(reject, new Error("connection error")),
                            { signal: settled.signal });
  });
}

// Report replies are the query s-expression JSON-encoded as a string (mirrors
// McPike's tryUnwrapJSONString on the HTTP path), and the frame may carry trailing
// whitespace — so parse first, then keep the value only if it is a string.
function unwrapQuery(text) {
  try {
    const parsed = JSON.parse(text);
    if (typeof parsed === "string") return parsed.replace(/\s+$/, "");
  } catch (e) {
    /* not a JSON string (e.g. an error frame) — show the frame as-is */
  }
  return text;
}

async function loadCode(action = "refresh") {
  setDoc(queryView, ";; loading\u2026");
  try {
    await socketReady();
    const reply = await new Promise((resolve, reject) => {
      pending.push({ resolve, reject });
      // The control action is itself a BOSS query against the monitoring engine.
      socket.send(`(EvaluateInEngines (List (Monitoring report)) ${action})`);
    });
    setDoc(queryView, unwrapQuery(reply));
  } catch (e) {
    setDoc(queryView, ";; failed to load via WebSocket\n;; " + e);
  }
}

let boss = null;
setDoc(resultView, ";; loading WebAssembly module…");
createBOSS({
  // The module tree is preloaded at /chibi and the context chdir()s there in
  // C++ before init (see BOSSWasm.cpp), so no preRun setup is needed here.
}).then(function (module) {
  boss = module;
  document.getElementById("evaluate").disabled = false;
  setDoc(resultView, ";; ready.");
}).catch(function (e) {
  setDoc(resultView, ";; failed to load: " + e);
});

for (const action of ["refresh", "approve", "reject"])
  document.getElementById(action).addEventListener("click", () => {
    if (action !== "refresh") bttMenu(false);
    loadCode(action);
  });
document.getElementById("evaluate").addEventListener("click", () => {
  if (boss === null) return;
  const expr = queryView.state.doc.toString();
  const pretty = document.getElementById("pretty").checked;
  const result = boss.evaluate(expr, pretty);
  setDoc(resultView, result.isError ? ";; error:\n" + result.text : result.text);
});

loadCode();
</script>
