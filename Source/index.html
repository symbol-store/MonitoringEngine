<!DOCTYPE html>
<meta charset="utf-8">
<style>
  #cols { display: flex; gap: 1rem; }
  #cols > div { flex: 1; min-width: 0; }
  #reject-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.4); }
  #reject-overlay[hidden] { display: none; }
  #reject-dialog { display: flex; flex-direction: column; gap: 0.5rem; min-width: 22rem; padding: 1rem; background: #fff; border-radius: 6px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3); }
  #reject-actions { display: flex; justify-content: flex-end; gap: 0.5rem; }
</style>
<button id="refresh">Refresh</button>
<button id="approve">Approve</button>
<button id="reject">Reject</button>
<button id="evaluate" disabled hidden>Evaluate</button>
<label hidden><input type="checkbox" id="pretty" checked> pretty-print</label>
<div id="cols">
  <div id="query"></div>
  <div id="result" hidden></div>
</div>
<div id="reject-overlay" hidden>
  <form id="reject-dialog">
    <label for="reject-reason">Reason for rejecting this query (optional):</label>
    <textarea id="reject-reason" rows="3"></textarea>
    <div id="reject-actions">
      <button type="button" id="reject-cancel">Cancel</button>
      <button type="submit" id="reject-confirm">Reject</button>
    </div>
  </form>
</div>
<script src="boss.js"></script>
<script type="importmap">
{
  "imports": {
    "@codemirror/state": "https://esm.sh/*@codemirror/state@6.7.1",
    "@codemirror/view": "https://esm.sh/*@codemirror/view@6.43.6",
    "@codemirror/language": "https://esm.sh/*@codemirror/language@6.12.4",
    "@codemirror/legacy-modes/": "https://esm.sh/*@codemirror/legacy-modes@6.5.3/",
    "@lezer/common": "https://esm.sh/*@lezer/common@1.5.2",
    "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.3",
    "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.10",
    "@marijn/find-cluster-break": "https://esm.sh/@marijn/find-cluster-break@1.0.3",
    "style-mod": "https://esm.sh/style-mod@4.1.3",
    "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
    "crelt": "https://esm.sh/crelt@1.0.7"
  }
}
</script>
<script type="module">
import { EditorView } from "@codemirror/view";
import { EditorState } from "@codemirror/state";
import { StreamLanguage, foldGutter, foldService, syntaxHighlighting, defaultHighlightStyle } from "@codemirror/language";
import { commonLisp } from "@codemirror/legacy-modes/mode/commonlisp";

const lispFold = foldService.of((state, lineStart, lineEnd) => {
  const s = state.doc.toString();
  let open = -1;
  for (let i = lineStart; i < lineEnd; i++) {
    if (s[i] === "(") { open = i; break; }
    if (s[i] === ";" || s[i] === '"') break;
  }
  if (open === -1) return null;

  let depth = 0, inString = false;
  for (let i = open; i < s.length; i++) {
    const ch = s[i];
    if (inString) {
      if (ch === "\\") i++;
      else if (ch === '"') inString = false;
      continue;
    }
    if (ch === '"') inString = true;
    else if (ch === ";") { while (i < s.length && s[i] !== "\n") i++; }
    else if (ch === "(") depth++;
    else if (ch === ")") {
      if (--depth === 0) {
        return i > lineEnd ? { from: lineEnd, to: i + 1 } : null;
      }
    }
  }
  return null;
});

function makeEditor(parent) {
  return new EditorView({
    state: EditorState.create({
      doc: "",
      extensions: [
        foldGutter({ openText: "▾", closedText: "▸" }),
        StreamLanguage.define(commonLisp),
        syntaxHighlighting(defaultHighlightStyle),
        lispFold,
        EditorState.readOnly.of(true),
        EditorView.editable.of(false),
      ],
    }),
    parent,
  });
}

const queryView = makeEditor(document.getElementById("query"));
const resultView = makeEditor(document.getElementById("result"));

function setDoc(view, text) {
  view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: text } });
}

const WS_URL = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/ws";

// A plain FIFO queue suffices: the server answers one frame per query, in receipt order.
let socket = null;
const pendingReplies = [];

function bttMenu(show) {
  if (typeof trigger_action !== "function") return;
  try {
    trigger_action({
      json: JSON.stringify({
        BTTPredefinedActionType: show ? 386 : 387,
        BTTAdditionalActionData: '{"BTTMenuActionMenuID":"BOSS", "BTTMenuActionActivateKeyboardFocus": 2}',
      }),
      wait_for_reply: true,
    });
  } catch (e) {
    /* best-effort; swallow BTT bridge failures */
  }
}

function notifyNewQuery(text) {
  if (text.startsWith(";; error:")) return;
  bttMenu(true);
}

function openSocket() {
  socket = new WebSocket(WS_URL);
  socket.addEventListener("message", (e) => {
    const waiter = pendingReplies.shift();
    if (waiter) waiter.resolve(e.data);
    notifyNewQuery(e.data);
  });
  const fail = (reason) => {
    while (pendingReplies.length) pendingReplies.shift().reject(reason);
    socket = null;
  };
  socket.addEventListener("close", () => fail(new Error("connection closed")));
  socket.addEventListener("error", () => fail(new Error("connection error")));
  return socket;
}

function socketReady() {
  if (!socket || socket.readyState === WebSocket.CLOSING || socket.readyState === WebSocket.CLOSED)
    openSocket();
  if (socket.readyState === WebSocket.OPEN) return Promise.resolve();
  return new Promise((resolve, reject) => {
    // abort() detaches the losing listener so it can't linger on the socket.
    const cleanup = new AbortController();
    const finish = (done, value) => { cleanup.abort(); done(value); };
    socket.addEventListener("open", () => finish(resolve), { signal: cleanup.signal });
    socket.addEventListener("error", () => finish(reject, new Error("connection error")),
                            { signal: cleanup.signal });
  });
}

// The reply is the query JSON-encoded as a string, sometimes with trailing whitespace
// (mirrors McPike's tryUnwrapJSONString) — so parse rather than strip quotes by hand.
function unwrapQuery(text) {
  try {
    const parsed = JSON.parse(text);
    if (typeof parsed === "string") return parsed.replace(/\s+$/, "");
  } catch (e) {
    /* not a JSON string (e.g. an error frame) — show the frame as-is */
  }
  return text;
}

// One report command in flight at a time: dropping re-entrant calls keeps each
// approve/reject bound to the query currently previewed, so a double-fire can't
// admit a parallel-submitted query the operator never reviewed.
let reportInFlight = false;

async function loadCode(action = "refresh") {
  if (reportInFlight) return;
  reportInFlight = true;
  setDoc(queryView, ";; loading\u2026");
  try {
    await socketReady();
    const reply = await new Promise((resolve, reject) => {
      pendingReplies.push({ resolve, reject });
      socket.send(`(EvaluateInEngines (List (Monitoring report)) ${action})`);
    });
    setDoc(queryView, unwrapQuery(reply));
  } catch (e) {
    setDoc(queryView, ";; failed to load via WebSocket\n;; " + e);
  } finally {
    reportInFlight = false;
  }
}

let boss = null;
setDoc(resultView, ";; loading WebAssembly module…");
createBOSS({
  // The module tree is preloaded at /chibi and the context chdir()s there in
  // C++ before init (see BOSSWasm.cpp), so no preRun setup is needed here.
}).then(function (module) {
  boss = module;
  document.getElementById("evaluate").disabled = false;
  setDoc(resultView, ";; ready.");
}).catch(function (e) {
  setDoc(resultView, ";; failed to load: " + e);
});

const rejectOverlay = document.getElementById("reject-overlay");
const rejectDialog = document.getElementById("reject-dialog");
const rejectReason = document.getElementById("reject-reason");
const rejectCancel = document.getElementById("reject-cancel");

// Resolves to the reason string ("" if confirmed with none), or null if dismissed.
function askRejectReason() {
  return new Promise((resolve) => {
    const cleanup = new AbortController();
    const close = (result) => { cleanup.abort(); rejectOverlay.hidden = true; resolve(result); };
    rejectDialog.addEventListener("submit", (e) => { e.preventDefault(); close(rejectReason.value.trim()); }, { signal: cleanup.signal });
    rejectCancel.addEventListener("click", () => close(null), { signal: cleanup.signal });
    rejectOverlay.addEventListener("click", (e) => { if (e.target === rejectOverlay) close(null); }, { signal: cleanup.signal });
    rejectOverlay.addEventListener("keydown", (e) => {
      // Don't let these reach the global handler: close() flips hidden mid-event,
      // which would otherwise re-fire reject/approve and reopen the overlay.
      if (e.key === "Escape") { e.stopPropagation(); close(null); }
      else if (e.key === "Enter" && e.altKey) { e.preventDefault(); e.stopPropagation(); rejectDialog.requestSubmit(); }
    }, { signal: cleanup.signal });
    rejectReason.value = "";
    rejectOverlay.hidden = false;
    rejectReason.focus();
  });
}

for (const action of ["refresh", "approve"])
  document.getElementById(action).addEventListener("click", () => {
    if (action !== "refresh") bttMenu(false);
    loadCode(action);
  });

document.getElementById("reject").addEventListener("click", async () => {
  const reason = await askRejectReason();
  if (reason === null) return; // dismissed without rejecting
  bttMenu(false);
  loadCode(reason ? `(RejectedByUserWithReason ${JSON.stringify(reason)})` : "reject");
});

window.addEventListener("keydown", (e) => {
  if (e.key !== "Enter" || !rejectOverlay.hidden) return;
  if (e.ctrlKey) { e.preventDefault(); document.getElementById("approve").click(); }
  else if (e.altKey) { e.preventDefault(); document.getElementById("reject").click(); }
});
document.getElementById("evaluate").addEventListener("click", () => {
  if (boss === null) return;
  const expr = queryView.state.doc.toString();
  const pretty = document.getElementById("pretty").checked;
  const result = boss.evaluate(expr, pretty);
  setDoc(resultView, result.isError ? ";; error:\n" + result.text : result.text);
});

loadCode();
</script>
