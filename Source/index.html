<!DOCTYPE html>
<meta charset="utf-8">
<style>
  #cols { display: flex; gap: 1rem; }
  #cols > div { flex: 1; min-width: 0; }
</style>
<button id="refresh">Refresh</button>
<button id="approve">Approve</button>
<button id="reject">Reject</button>
<button id="evaluate" disabled>Evaluate</button>
<label><input type="checkbox" id="pretty" checked> pretty-print</label>
<div id="cols">
  <div id="query"></div>
  <div id="result"></div>
</div>
<script src="boss.js"></script>
<script type="importmap">
{
  "imports": {
    "@codemirror/state": "https://esm.sh/*@codemirror/state@6.7.1",
    "@codemirror/view": "https://esm.sh/*@codemirror/view@6.43.6",
    "@codemirror/language": "https://esm.sh/*@codemirror/language@6.12.4",
    "@codemirror/legacy-modes/": "https://esm.sh/*@codemirror/legacy-modes@6.5.3/",
    "@lezer/common": "https://esm.sh/*@lezer/common@1.5.2",
    "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.3",
    "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.10",
    "@marijn/find-cluster-break": "https://esm.sh/@marijn/find-cluster-break@1.0.3",
    "style-mod": "https://esm.sh/style-mod@4.1.3",
    "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
    "crelt": "https://esm.sh/crelt@1.0.7"
  }
}
</script>
<script type="module">
import { EditorView } from "@codemirror/view";
import { EditorState } from "@codemirror/state";
import { StreamLanguage, foldGutter, foldService, syntaxHighlighting, defaultHighlightStyle } from "@codemirror/language";
import { commonLisp } from "@codemirror/legacy-modes/mode/commonlisp";

const lispFold = foldService.of((state, lineStart, lineEnd) => {
  const s = state.doc.toString();
  let open = -1;
  for (let i = lineStart; i < lineEnd; i++) {
    if (s[i] === "(") { open = i; break; }
    if (s[i] === ";" || s[i] === '"') break;
  }
  if (open === -1) return null;

  let depth = 0, inString = false;
  for (let i = open; i < s.length; i++) {
    const ch = s[i];
    if (inString) {
      if (ch === "\\") i++;
      else if (ch === '"') inString = false;
      continue;
    }
    if (ch === '"') inString = true;
    else if (ch === ";") { while (i < s.length && s[i] !== "\n") i++; }
    else if (ch === "(") depth++;
    else if (ch === ")") {
      if (--depth === 0) {
        return i > lineEnd ? { from: lineEnd, to: i + 1 } : null;
      }
    }
  }
  return null;
});

function makeEditor(parent) {
  return new EditorView({
    state: EditorState.create({
      doc: "",
      extensions: [
        foldGutter({ openText: "▾", closedText: "▸" }),
        StreamLanguage.define(commonLisp),
        syntaxHighlighting(defaultHighlightStyle),
        lispFold,
        EditorState.readOnly.of(true),
        EditorView.editable.of(false),
      ],
    }),
    parent,
  });
}

const queryView = makeEditor(document.getElementById("query"));
const resultView = makeEditor(document.getElementById("result"));

function setDoc(view, text) {
  view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: text } });
}

async function loadCode(suffix = "refresh") {
  const SOURCE = "/EvaluateInEngines/List/Monitoring/:/report/////" + suffix;
  setDoc(queryView, ";; loading…");
  try {

  
    const res = await fetch(SOURCE, { cache: "no-store" });
    if (!res.ok) throw new Error(res.status + " " + res.statusText);
    setDoc(queryView, await res.text());
  } catch (e) {
    setDoc(queryView, ";; failed to load " + SOURCE + "\n;; " + e);
  }
}

let boss = null;
setDoc(resultView, ";; loading WebAssembly module…");
createBOSS({
  // The module tree is preloaded at /chibi and the context chdir()s there in
  // C++ before init (see BOSSWasm.cpp), so no preRun setup is needed here.
}).then(function (module) {
  boss = module;
  document.getElementById("evaluate").disabled = false;
  setDoc(resultView, ";; ready.");
}).catch(function (e) {
  setDoc(resultView, ";; failed to load: " + e);
});

document.getElementById("refresh").addEventListener("click", () => loadCode("refresh"));
document.getElementById("approve").addEventListener("click", () => loadCode("approve"));
document.getElementById("reject").addEventListener("click", () => loadCode("reject"));
document.getElementById("evaluate").addEventListener("click", () => {
  if (boss === null) return;
  const expr = queryView.state.doc.toString();
  const pretty = document.getElementById("pretty").checked;
  const result = boss.evaluate(expr, pretty);
  setDoc(resultView, result.isError ? ";; error:\n" + result.text : result.text);
});

loadCode();
</script>
